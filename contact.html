<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="./assets/Imagem.jpg" type="Imagem/jpg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - Beatriz Candido</title>
    <link rel="stylesheet" href="./css/contact.css">
</head>
<body>
    <video autoplay loop muted>
        <source src="./video/loney.mp4" type="video/mp4">
    </video>
    <header class="header">
        <div class="logo-container">
            <img class="small-logo" src="./assets/Imagem.jpg" alt="Logo">
        </div>
        <div class="container">
            <button class="navbar-toggler" id="toggleButton" aria-label="Toggle navigation">
                <span class="hamburguer"></span>
                <span class="hamburguer"></span>
                <span class="hamburguer"></span>
            </button>
            <nav class="navbar" id="navbarNav">
                <ul class="nav-list">
                    <li class="nav-item"><a href="./index.html" class="nav-link ">Home</a></li>
                    <li class="nav-item"><a href="./about.html" class="nav-link">Sobre mim</a></li>
                    <li class="nav-item"><a href="./curriculo.html" class="nav-link">Currículo</a></li>
                    <li class="nav-item"><a href="./projects.html" class="nav-link">Projetos</a></li>
                    <li class="nav-item"><a href="./contact.html" class="nav-link active">Contato</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <main class="contato">
        <section class="box-transparente">
            <h1 class="contato__titulo">Entre em Contato</h1>
            <form id="contatoForm" class="contato__form">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" required>

                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" required>

                <label for="mensagem">Mensagem:</label>
                <textarea id="mensagem" name="mensagem" rows="4" required></textarea>

                <button type="submit">Enviar</button>
            </form>
        </section>
    </main>
    <footer class="rodape">
        <div class="social-icons">
            <a href="https://github.com/bimos2">
                <img src="./assets/github.png" alt="GitHub">
            </a>
            <a href="https://linkedin.com/in/seunome">
                <img src="./assets/linkedin.png" alt="LinkedIn">
            </a>
            <a href="https://twitch.tv/seunome">
                <img src="./assets/instagram.png" alt="Instagram">
            </a>
        </div>
        <p>© 2024 Todos os direitos reservados.</p>
    </footer>
    <script src="./js/script.js"></script>
    <script src="./js/validar_form.js"></script>
</body>
</html>
