<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="./assets/Imagem.jpg" type="Imagem/jpg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - Beatriz Candido</title>
    <link rel="stylesheet" href="./css/contact.css">
</head>
<body>
    <video autoplay loop muted>
        <source src="./video/loney.mp4" type="video/mp4">
    </video>
    <header>
        <nav class="navbar">
            <a href="./index.html" class="navbar__link">Home</a>
            <a href="./about.html" class="navbar__link">Sobre mim</a>
            <a href="./curriculo.html" class="navbar__link">Currículo</a>
            <a href="./projects.html" class="navbar__link">Projects</a>
            <a href="./contact.html" class="navbar__link active">Contato</a>
        </nav>
    </header>
    <main class="contato">
        <section class="box-transparente">
            <h1 class="contato__titulo">Entre em Contato</h1>
            <form class="contato__form">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" required>

                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" required>

                <label for="mensagem">Mensagem:</label>
                <textarea id="mensagem" name="mensagem" rows="4" required></textarea>

                <button type="submit">Enviar</button>
            </form>
        </section>
    </main>
    <footer class="rodape">
        <div class="social-icons">
            <a href="https://github.com/bimos2">
                <img src="./assets/github.png" alt="GitHub">
            </a>
            <a href="https://linkedin.com/in/seunome">
                <img src="./assets/linkedin.png" alt="LinkedIn">
            </a>
            <a href="https://twitch.tv/seunome">
                <img src="./assets/instagram.png" alt="Twitch">
            </a>
        </div>
        <p>© 2024 Todos os direitos reservados.</p>
    </footer>
</body>
</html>
